openapi: 3.1.0
info:
  title: FanQuin API
  description: |
    Social fantasy football platform — quinielas, team ownership, leaderboards.

    ## Authentication
    Most protected routes require a `Bearer` session token in the `Authorization` header.
    Tokens are obtained from `POST /api/auth/verify-code` and stored client-side
    (localStorage key `fanquin_session`). Sessions expire after 30 days.

    ## Product System Cross-Reference
    This spec is designed to "handshake" with `docs/PRODUCT_SYSTEM.md`.
    Endpoint descriptions reference specific sections (§) of that document.

    ## Scoring Summary (defaults — per group `scoring_config`)
    | Outcome | Default pts |
    |---|---|
    | exact_score | 5 |
    | correct_winner | 3 |
    | goal_difference | 2 |
    | incorrect | 0 |
    | team win | 6 |
    | team goal | 2 |
    | team clean sheet | 4 |

    ## Group Modes
    - `friends` / `casual` — predictions only, no ELO
    - `league` — predictions + ELO ratings
    - `competitive` — predictions + ELO + survivor lives
    - `global` — all features + daily challenges
    - `ownership` — team ownership points only (no score predictions)
  version: 1.0.0
  contact:
    name: FanQuin
    url: https://fanquin.com

servers:
  - url: /api
    description: Current deployment

tags:
  - name: Health
    description: Service health check
  - name: Auth
    description: OTP-based passwordless authentication
  - name: Competitions
    description: Competition and fixture data (public)
  - name: Venues
    description: Stadium / venue data (public)
  - name: Profile
    description: Authenticated user profile
  - name: Groups
    description: Fantasy groups — create, join, manage
  - name: Predictions
    description: Match score predictions
  - name: Live
    description: Live match data and on-demand sync from football-data.org
  - name: Admin
    description: Admin-only operations (requires X-Admin-Secret header)
  - name: Notifications
    description: In-app notification management
  - name: Rivalries
    description: Weekly 1v1 rivalry matchups per group
  - name: Boosts
    description: Power-up boosts for group matches
  - name: DailyChallenges
    description: Daily bonus challenges (global mode)
  - name: Legal
    description: Privacy policy and terms of service documents
  - name: Support
    description: User support case submission
  - name: Draft
    description: Live snake draft room — real-time team pick flow (60s per turn)

# ─────────────────────────────────────────────────────────────────
# REUSABLE SCHEMAS
# ─────────────────────────────────────────────────────────────────
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: hex96 # 48-byte random token as hex string
    AdminSecret:
      type: apiKey
      in: header
      name: X-Admin-Secret
      description: Server-side secret from ADMIN_SECRET env var

  schemas:
    # ── Generic wrappers ─────────────────────────────────────────
    ApiSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          enum: [true]

    ApiError:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
          enum: [false]
        message:
          type: string
        error:
          type: string

    # ── Auth ─────────────────────────────────────────────────────
    SendCodeRequest:
      type: object
      required: [identifier]
      properties:
        identifier:
          type: string
          format: email
          example: felix@example.com
        delivery_method:
          type: string
          enum: [email]
          default: email

    SendCodeResponse:
      allOf:
        - $ref: "#/components/schemas/ApiSuccess"
        - type: object
          properties:
            message:
              type: string
            debug_code:
              type: integer
              description: Only present in development mode

    VerifyCodeRequest:
      type: object
      required: [identifier, code]
      properties:
        identifier:
          type: string
          format: email
        code:
          type: string
          minLength: 6
          maxLength: 6
          example: "482910"
        username:
          type: string
          description: Desired username (3-30 chars, lowercase alphanumeric + underscore). Optional for new users.
        first_name:
          type: string
          description: Optional for new user profile setup.
        last_name:
          type: string
          description: Optional for new user profile setup.
        phone:
          type: string
          description: Optional for new user profile setup.
        country:
          type: string
          description: ISO 3166-1 alpha-2 country code. Optional for new user profile setup.
        locale:
          type: string
          description: UI locale preference (en/es). Stored on the profile.

    VerifyCodeResponse:
      allOf:
        - $ref: "#/components/schemas/ApiSuccess"
        - type: object
          required: [sessionToken, user]
          properties:
            sessionToken:
              type: string
              description: Opaque 96-char hex token. Store in localStorage.
            user:
              $ref: "#/components/schemas/UserProfile"

    ValidateSessionResponse:
      allOf:
        - $ref: "#/components/schemas/ApiSuccess"
        - type: object
          required: [user]
          properties:
            user:
              $ref: "#/components/schemas/UserProfile"

    # ── User ─────────────────────────────────────────────────────
    UserProfile:
      type: object
      required: [id, username, locale, created_at]
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        display_name:
          type: string
          nullable: true
        first_name:
          type: string
          nullable: true
        last_name:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        country:
          type: string
          nullable: true
          description: ISO 3166-1 alpha-2 country code (e.g. MX, US, ES).
        avatar_url:
          type: string
          format: uri
          nullable: true
        locale:
          type: string
          example: en
        created_at:
          type: string
          format: date-time

    UpdateProfileRequest:
      type: object
      properties:
        username:
          type: string
        display_name:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        phone:
          type: string
        country:
          type: string
        avatar_url:
          type: string
          format: uri
        locale:
          type: string

    # ── Competition ───────────────────────────────────────────────
    Competition:
      type: object
      required: [id, name, type, season]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        short_name:
          type: string
          nullable: true
        type:
          type: string
        season:
          type: string
        starts_at:
          type: string
          format: date-time
          nullable: true
        ends_at:
          type: string
          format: date-time
          nullable: true
        is_active:
          type: boolean
        is_test:
          type: boolean
          description: When true, hidden from public competition lists. Toggle to false to expose in production for broad testing.
        logo_url:
          type: string
          format: uri
          nullable: true

    # ── Team ─────────────────────────────────────────────────────
    Team:
      type: object
      required: [id, competition_id, name]
      properties:
        id:
          type: string
          format: uuid
        competition_id:
          type: string
          format: uuid
        name:
          type: string
        short_name:
          type: string
          nullable: true
        country_code:
          type: string
          nullable: true
        flag_url:
          type: string
          format: uri
          nullable: true
        group_label:
          type: string
          nullable: true
        tier:
          type: integer
          nullable: true
        is_placeholder:
          type: boolean

    # ── Venue ─────────────────────────────────────────────────────
    Venue:
      type: object
      required: [id, name, city, country]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        city:
          type: string
        country:
          type: string
        capacity:
          type: integer
          nullable: true
        latitude:
          type: number
          nullable: true
        longitude:
          type: number
          nullable: true

    # ── Match ─────────────────────────────────────────────────────
    Match:
      type: object
      required: [id, competition_id, stage, status]
      properties:
        id:
          type: string
          format: uuid
        competition_id:
          type: string
          format: uuid
        match_number:
          type: integer
          nullable: true
        stage:
          type: string
          example: group
        match_date:
          type: string
          format: date-time
          nullable: true
        prediction_lock:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
          enum: [scheduled, live, completed, cancelled]
        home_team:
          $ref: "#/components/schemas/Team"
        away_team:
          $ref: "#/components/schemas/Team"
        venue:
          $ref: "#/components/schemas/Venue"
        home_score:
          type: integer
          nullable: true
        away_score:
          type: integer
          nullable: true
        ht_score_home:
          type: integer
          nullable: true
          description: Half-time home score (populated during/after match sync).
        ht_score_away:
          type: integer
          nullable: true
          description: Half-time away score (populated during/after match sync).

    # ── Group ─────────────────────────────────────────────────────
    BonusCriteria:
      type: object
      description: Admin-configurable bonus prediction criteria for a group.
      properties:
        enabled:
          type: array
          items:
            type: string
            enum: [btts, total_goals_over, ft_winner, ht_winner, clean_sheet]
          description: Which bonus criteria are active for this group.
        btts_pts:
          type: integer
          minimum: 0
          maximum: 50
          description: Points awarded for correct Both Teams To Score prediction.
        total_goals_over_pts:
          type: integer
          minimum: 0
          maximum: 50
          description: Points awarded for correct over/under total goals prediction.
        total_goals_threshold:
          type: number
          minimum: 0
          maximum: 20
          description: Goal threshold for total_goals_over criterion (e.g. 2.5).
        ft_winner_pts:
          type: integer
          minimum: 0
          maximum: 50
          description: Points awarded for correct full-time result prediction (standalone, independent of score).
        ht_winner_pts:
          type: integer
          minimum: 0
          maximum: 50
          description: Points awarded for correct half-time result prediction.
        clean_sheet_pts:
          type: integer
          minimum: 0
          maximum: 50
          description: Points awarded for correct clean sheet prediction.

    BonusPredictionDetails:
      type: object
      description: Optional extra prediction answers submitted alongside score prediction.
      properties:
        btts:
          type: boolean
          nullable: true
          description: User's prediction for Both Teams To Score.
        total_goals_over:
          type: boolean
          nullable: true
          description: User's prediction for total goals over the group threshold.
        ft_winner:
          type: string
          enum: [home, draw, away]
          nullable: true
          description: User's standalone full-time result prediction (independent of score prediction).
        ht_winner:
          type: string
          enum: [home, draw, away]
          nullable: true
          description: User's prediction for the half-time result.
        clean_sheet:
          type: string
          enum: [home, away, none]
          nullable: true
          description: User's prediction for which team (or none) keeps a clean sheet.

    UpdateGroupBonusCriteriaRequest:
      type: object
      description: Partial update for group bonus criteria (only provided fields are changed).
      properties:
        bonus_criteria:
          $ref: "#/components/schemas/BonusCriteria"

    Group:
      type: object
      required: [id, name, competition_id, mode, owner_id]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        invite_code:
          type: string
        competition_id:
          type: string
          format: uuid
        mode:
          type: string
          enum: [casual, friends, league, competitive, global, ownership]
        status:
          type: string
          enum: [waiting, draft, active, completed]
          description: Group lifecycle state. See §1.3 of PRODUCT_SYSTEM.md.
        draft_type:
          type: string
          enum: [snake, random, balanced_tier]
        scoring_config:
          type: object
          additionalProperties:
            oneOf:
              - type: number
              - type: boolean
          description: |
            Per-group scoring configuration. Default values — exact_score_pts: 5,
            correct_winner_pts: 3, goal_difference_pts: 2, team_win_pts: 6,
            team_goal_pts: 2, team_clean_sheet_pts: 4, streak_bonus_threshold: 3,
            streak_bonus_pts: 2. See §6.4 of PRODUCT_SYSTEM.md.
        draft_started_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when the snake draft was initiated (status → draft).
        started_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when the group became active (status → active).
        owner_id:
          type: string
          format: uuid
        max_members:
          type: integer
        member_count:
          type: integer
        is_active:
          type: boolean
        bonus_criteria:
          $ref: "#/components/schemas/BonusCriteria"
          description: Optional bonus scoring criteria configured by the group admin.

    CreateGroupRequest:
      type: object
      required: [name, competition_id, mode]
      properties:
        name:
          type: string
        competition_id:
          type: string
          format: uuid
        mode:
          type: string
          enum: [casual, friends, league, competitive, global, ownership]
        draft_type:
          type: string
          enum: [snake, random, balanced_tier]
          default: snake
        max_members:
          type: integer
          default: 50
        bonus_criteria:
          $ref: "#/components/schemas/BonusCriteria"
          description: Optional initial bonus criteria configuration.

    JoinGroupRequest:
      type: object
      required: [invite_code]
      properties:
        invite_code:
          type: string

    # ── Leaderboard ───────────────────────────────────────────────
    LeaderboardEntry:
      type: object
      properties:
        rank:
          type: integer
        user_id:
          type: string
          format: uuid
        username:
          type: string
        display_name:
          type: string
          nullable: true
        avatar_url:
          type: string
          format: uri
          nullable: true
        total_points:
          type: integer
        prediction_pts:
          type: integer
        ownership_pts:
          type: integer
        current_streak:
          type: integer
        elo_rating:
          type: integer

    # ── Team Ownership ────────────────────────────────────────────
    TeamOwnership:
      type: object
      properties:
        id:
          type: string
          format: uuid
        group_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        username:
          type: string
        display_name:
          type: string
          nullable: true
        team:
          $ref: "#/components/schemas/Team"
        draft_pick:
          type: integer
          nullable: true
        total_pts:
          type: integer
        wins_pts:
          type: integer
        goals_pts:
          type: integer
        clean_sheet_pts:
          type: integer

    # ── Predictions ───────────────────────────────────────────────
    SubmitPredictionRequest:
      type: object
      required: [group_id, match_id, predicted_home, predicted_away]
      properties:
        group_id:
          type: string
          format: uuid
        match_id:
          type: string
          format: uuid
        predicted_home:
          type: integer
          minimum: 0
        predicted_away:
          type: integer
          minimum: 0
        details:
          $ref: "#/components/schemas/BonusPredictionDetails"
          description: Optional bonus prediction answers (only relevant if group has bonus_criteria enabled).

    Prediction:
      type: object
      properties:
        id:
          type: string
          format: uuid
        group_id:
          type: string
          format: uuid
        match_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        predicted_home:
          type: integer
        predicted_away:
          type: integer
        result:
          type: string
          enum:
            [pending, exact_score, correct_winner, goal_difference, incorrect]
          description: |
            Scoring outcome — exact_score: +5pts (default), correct_winner: +3pts,
            goal_difference: +2pts, incorrect: 0pts. Points are per scoring_config. See §1.5 of PRODUCT_SYSTEM.md.
        points_earned:
          type: integer
          nullable: true
        upset_pts:
          type: integer
          nullable: true
        bonus_pts:
          type: integer
          description: Points earned from bonus criteria predictions.
          default: 0
        details:
          $ref: "#/components/schemas/BonusPredictionDetails"
          description: Bonus prediction answers submitted by the user.
        submitted_at:
          type: string
          format: date-time

    LiveMatchPrediction:
      type: object
      description: A single group's prediction for a match.
      properties:
        group_id:
          type: string
          format: uuid
        group_name:
          type: string
        predicted_home:
          type: integer
          nullable: true
        predicted_away:
          type: integer
          nullable: true
        result:
          type: string
          nullable: true
          enum:
            [pending, exact_score, correct_winner, goal_difference, incorrect]
        points_earned:
          type: integer
          nullable: true
        bonus_pts:
          type: integer
          nullable: true
          description: Points from bonus criteria for this prediction.
        details:
          $ref: "#/components/schemas/BonusPredictionDetails"
          nullable: true
        group_bonus_criteria:
          $ref: "#/components/schemas/BonusCriteria"
          nullable: true
          description: The bonus criteria config for this group.

    LivePageData:
      type: object
      description: Full data payload for the Live page.
      properties:
        live:
          type: array
          items:
            $ref: "#/components/schemas/Match"
          description: Matches currently in progress.
        upcoming:
          type: array
          items:
            $ref: "#/components/schemas/Match"
          description: Next 20 scheduled matches.
        recent:
          type: array
          items:
            $ref: "#/components/schemas/Match"
          description: Last 20 completed matches.
        my_active_groups:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              name:
                type: string
              competition_id:
                type: string
                format: uuid
              bonus_criteria:
                $ref: "#/components/schemas/BonusCriteria"
              owned_team_ids:
                type: array
                items:
                  type: string
                  format: uuid
                description: Team IDs the user has drafted in this group. Empty array means no draft has been completed yet.
          description: User's active groups for this competition (only when authenticated).
        last_synced_at:
          type: string
          format: date-time
          nullable: true
          description: When the competition was last synced from football-data.org.
        competition:
          allOf:
            - $ref: "#/components/schemas/Competition"
          nullable: true

    SyncResult:
      type: object
      description: Summary of a sync-matches operation.
      properties:
        matches_checked:
          type: integer
          description: Total matches returned by football-data.org.
        matches_updated:
          type: integer
          description: Matches whose status or score changed in the DB.
        predictions_scored:
          type: integer
          description: Pending predictions that were evaluated and awarded points.
        ownership_points_awarded:
          type: integer
          description: Team-ownership point transactions created.
        streak_bonuses_awarded:
          type: integer
          description: Number of streak bonus point grants this sync.
        upset_bonuses_awarded:
          type: integer
          description: Number of upset bonus point grants this sync.
        elo_updates_applied:
          type: integer
          description: ELO rating updates applied (league/competitive groups).

    Notification:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum:
            [
              lock_reminder,
              rivalry_result,
              rank_swing,
              boost_ready,
              streak_broken,
            ]
        title:
          type: string
        body:
          type: string
          nullable: true
        metadata:
          type: object
          nullable: true
        is_read:
          type: boolean
        created_at:
          type: string
          format: date-time

    Rivalry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        week_number:
          type: integer
        status:
          type: string
          enum: [active, completed]
        player_a_pts:
          type: integer
        player_b_pts:
          type: integer
        winner_id:
          type: string
          format: uuid
          nullable: true
        player_a:
          $ref: "#/components/schemas/UserProfile"
        player_b:
          $ref: "#/components/schemas/UserProfile"

    Boost:
      type: object
      properties:
        id:
          type: string
          format: uuid
        boost_type:
          type: string
          enum:
            [
              double_points,
              underdog_boost,
              last_minute_change,
              streak_insurance,
            ]
        match_id:
          type: string
          format: uuid
          nullable: true
        applied_at:
          type: string
          format: date-time
          nullable: true
        expires_at:
          type: string
          format: date-time
          nullable: true
        is_used:
          type: boolean
        created_at:
          type: string
          format: date-time

    DailyChallenge:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        challenge_date:
          type: string
          format: date
        bonus_pts:
          type: integer
        competition_id:
          type: string
          format: uuid
          nullable: true

    DailyChallengeEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        challenge_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        answer:
          description: Flexible JSON answer
        pts_earned:
          type: integer
        submitted_at:
          type: string
          format: date-time

    # ── Group Members ─────────────────────────────────────────────
    GroupMember:
      type: object
      description: A user's membership record within a group, including draft and scoring state.
      required: [id, group_id, user_id, username, role, total_points, joined_at]
      properties:
        id:
          type: string
          format: uuid
        group_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        username:
          type: string
        display_name:
          type: string
          nullable: true
        avatar_url:
          type: string
          format: uri
          nullable: true
        role:
          type: string
          enum: [admin, member]
        total_points:
          type: integer
          default: 0
        joined_at:
          type: string
          format: date-time
        auto_pick:
          type: boolean
          nullable: true
          description: When true, the next pick will be auto-assigned if the 60s timer expires.

    # ── Draft ─────────────────────────────────────────────────────
    DraftSession:
      type: object
      description: |
        Live snake draft session state. See §4.5 of PRODUCT_SYSTEM.md.
        Turn order reverses each round (snake pattern). Each picker has 60 seconds;
        on timeout a team is auto-assigned and the session advances.
      required:
        [
          group_id,
          member_order,
          current_pick,
          total_picks,
          current_picker_id,
          round,
          is_complete,
        ]
      properties:
        group_id:
          type: string
          format: uuid
        member_order:
          type: array
          items:
            type: string
            format: uuid
          description: User IDs in round-1 pick order. Order reverses on even rounds (snake).
        current_pick:
          type: integer
          description: 0-indexed overall pick counter.
        total_picks:
          type: integer
          description: Total number of teams to be drafted (members × teams_per_member).
        pick_deadline:
          type: string
          format: date-time
          nullable: true
          description: ISO timestamp when the current pick expires. Null if draft is complete.
        current_picker_id:
          type: string
          format: uuid
          nullable: true
          description: User ID whose turn it currently is. Null when draft is complete.
        round:
          type: integer
          description: Current round number (1-based).
        is_complete:
          type: boolean
          description: True once all total_picks have been made.

    DraftPick:
      type: object
      description: A single recorded team pick made during the snake draft.
      required:
        [
          id,
          group_id,
          user_id,
          team_id,
          pick_number,
          round,
          auto_picked,
          picked_at,
        ]
      properties:
        id:
          type: string
          format: uuid
        group_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        team_id:
          type: string
          format: uuid
        pick_number:
          type: integer
          description: Overall pick number (1-based).
        round:
          type: integer
          description: Round number this pick belongs to (1-based).
        auto_picked:
          type: boolean
          description: True if this pick was made automatically due to timer expiry.
        picked_at:
          type: string
          format: date-time
        team:
          $ref: "#/components/schemas/Team"
        username:
          type: string
          nullable: true
        display_name:
          type: string
          nullable: true

    DraftState:
      type: object
      description: Full snapshot of draft room state returned by GET /groups/{id}/draft.
      required: [session, picks, available_teams, members]
      properties:
        session:
          $ref: "#/components/schemas/DraftSession"
        picks:
          type: array
          items:
            $ref: "#/components/schemas/DraftPick"
          description: All picks made so far, ordered by pick_number.
        available_teams:
          type: array
          items:
            $ref: "#/components/schemas/Team"
          description: Teams that have not yet been picked.
        members:
          type: array
          items:
            $ref: "#/components/schemas/GroupMember"
          description: All group members with their draft metadata.

    SubmitPickRequest:
      type: object
      required: [team_id]
      description: Request body for POST /groups/{id}/picks. Only valid when it is the authenticated user's turn.
      properties:
        team_id:
          type: string
          format: uuid
          description: UUID of the team to pick. Must be in available_teams from DraftState.

    # ── Support Cases ─────────────────────────────────────────────
    SupportCase:
      type: object
      required:
        [
          id,
          user_id,
          category,
          subject,
          message,
          status,
          created_at,
          updated_at,
        ]
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        category:
          type: string
          enum:
            [account, group, predictions, scoring, technical, billing, other]
        subject:
          type: string
          minLength: 3
          maxLength: 200
        message:
          type: string
          minLength: 10
          maxLength: 5000
        status:
          type: string
          enum: [open, in_review, resolved, closed]
          default: open
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateSupportCaseRequest:
      type: object
      required: [category, subject, message]
      properties:
        category:
          type: string
          enum:
            [account, group, predictions, scoring, technical, billing, other]
        subject:
          type: string
          minLength: 3
          maxLength: 200
        message:
          type: string
          minLength: 10
          maxLength: 5000

    UpdateGroupRequest:
      type: object
      description: Partial update for a group (owner only, while status is waiting).
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 80
        max_members:
          type: integer
          minimum: 2
          maximum: 100
        bonus_criteria:
          $ref: "#/components/schemas/BonusCriteria"

    # ── Legal Documents ────────────────────────────────────────────
    LegalDocument:
      type: object
      required:
        [
          id,
          type,
          version,
          title,
          content,
          jurisdiction,
          effective_date,
          is_active,
          created_at,
        ]
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [privacy, terms]
        version:
          type: string
          example: "1.0"
        title:
          type: string
        content:
          type: string
          description: Document body in Markdown format
        jurisdiction:
          type: string
          example: MX
        effective_date:
          type: string
          format: date
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time

# ─────────────────────────────────────────────────────────────────
# PATHS
# ─────────────────────────────────────────────────────────────────
paths:
  # ── Health ───────────────────────────────────────────────────
  /ping:
    get:
      tags: [Health]
      summary: Health check
      responses:
        "200":
          description: Alive
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          message:
                            type: string

  # ── Auth ─────────────────────────────────────────────────────
  /auth/check-email:
    get:
      tags: [Auth]
      summary: Check if a user exists by email
      description: Used by the sign-up/sign-in UI to decide whether to show the profile form.
      parameters:
        - in: query
          name: email
          required: true
          schema:
            type: string
            format: email
      responses:
        "200":
          description: Check result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      exists:
                        type: boolean
        "400":
          description: Invalid email
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /auth/check-username:
    get:
      tags: [Auth]
      summary: Check if a username is available
      description: Returns whether the given username is not yet taken. Used for real-time availability feedback in the sign-up form.
      parameters:
        - in: query
          name: username
          required: true
          schema:
            type: string
            pattern: "^[a-z0-9_]{3,30}$"
      responses:
        "200":
          description: Availability result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      available:
                        type: boolean
        "400":
          description: Invalid username format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /auth/send-code:
    post:
      tags: [Auth]
      summary: Send a 6-digit OTP to the provided email
      description: |
        Generates a 6-digit OTP, bcrypt-hashes it, stores it in `otp_requests`,
        and emails it to the user. Rate-limited to 5 requests per identifier per
        15-minute window (returns 429 on breach). OTP expires after 10 minutes.
        Up to 5 incorrect verify attempts are allowed before the OTP is invalidated.
        See §11.1 of PRODUCT_SYSTEM.md for security details.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendCodeRequest"
      responses:
        "200":
          description: Code sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendCodeResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /auth/verify-code:
    post:
      tags: [Auth]
      summary: Verify the OTP and obtain a session token
      description: |
        Verifies the submitted OTP against the bcrypt hash in `otp_requests`.
        On first sign-in, a Supabase Auth user + profile row are created automatically
        and a welcome email is sent. Returns a 96-char hex session token (store in
        `localStorage` key `fanquin_session`). Sessions expire after 30 days.
        Accepts optional profile fields (`first_name`, `last_name`, `phone`,
        `country`, `username`, `locale`) for new user profile setup.
        See §4.3 and §11.1 of PRODUCT_SYSTEM.md.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyCodeRequest"
      responses:
        "200":
          description: Verification successful — session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyCodeResponse"
        "401":
          description: Invalid or expired code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /auth/validate:
    get:
      tags: [Auth]
      summary: Validate a session token and return the current user
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Session is valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidateSessionResponse"
        "401":
          description: Missing, invalid, or expired session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /auth/logout:
    post:
      tags: [Auth]
      summary: Revoke the current session
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Signed out
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      message:
                        type: string

  # ── Live Page ────────────────────────────────────────────────
  /live:
    get:
      tags: [Live]
      summary: Get live page data (reads DB only)
      description: |
        Returns matches grouped into three bands: `live`, `upcoming` (next 20), and
        `recent` (last 20 completed). Optionally enriches each match with the
        authenticated user's predictions across their active groups.

        This endpoint never calls an external API — it only reads the database.
        To sync match data from football-data.org, call `POST /sync-matches` first.

        `my_active_groups` is only populated when authenticated and includes
        `owned_team_ids` for ownership-mode groups. See §4.7 of PRODUCT_SYSTEM.md.
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: competition_id
          schema:
            type: string
            format: uuid
          description: Scope results to a specific competition. Defaults to the first active competition.
      responses:
        "200":
          description: Live page data
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/LivePageData"

  /sync-matches:
    post:
      tags: [Live]
      summary: Pull latest match data from football-data.org and update DB
      description: |
        Calls the football-data.org API for the target competition, updates match
        statuses and scores, scores any pending predictions for newly-completed
        matches, and awards team ownership points (win +6, goal +2, clean sheet +4
        by default). Also applies streak bonus and ELO updates.

        Rate-limited to once per 5 minutes per competition. Requires auth.
        Requires `FOOTBALL_DATA_API_KEY` env var.

        See §5.4 (data flow) and §6.3 (scoring tables) of PRODUCT_SYSTEM.md.
      security:
        - BearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                competition_id:
                  type: string
                  format: uuid
                  description: Competition to sync. Defaults to the first active competition.
      responses:
        "200":
          description: Sync result summary
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/SyncResult"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "429":
          description: Rate limit — synced less than 5 minutes ago
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: External API error or DB update failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  # ── Competitions ─────────────────────────────────────────────
  /competitions:
    get:
      tags: [Competitions]
      summary: List all active competitions
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Competition"

  /competitions/{id}/teams:
    get:
      tags: [Competitions]
      summary: List teams for a competition
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Team"

  /competitions/{id}/matches:
    get:
      tags: [Competitions]
      summary: List matches for a competition
      description: Returns matches with embedded home/away team and venue objects.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: stage
          schema:
            type: string
            example: group
        - in: query
          name: status
          schema:
            type: string
            enum: [scheduled, live, finished, cancelled]
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Match"

  # ── Venues ───────────────────────────────────────────────────
  /venues:
    get:
      tags: [Venues]
      summary: List all venues
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Venue"

  # ── Profile ──────────────────────────────────────────────────
  /profile:
    get:
      tags: [Profile]
      summary: Get the authenticated user's profile
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/UserProfile"
        "401":
          $ref: "#/components/schemas/ApiError"

    patch:
      tags: [Profile]
      summary: Update the authenticated user's profile
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/UserProfile"
        "400":
          $ref: "#/components/schemas/ApiError"
        "401":
          $ref: "#/components/schemas/ApiError"

  # ── Groups ───────────────────────────────────────────────────
  /groups:
    get:
      tags: [Groups]
      summary: List groups the authenticated user belongs to
      description: |
        Returns all groups the user is a member of, including `member_count`.
        Groups can be in modes: `casual`, `friends`, `league`, `competitive`,
        `global`, or `ownership`. See §1.3 of PRODUCT_SYSTEM.md for mode differences.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Group"

    post:
      tags: [Groups]
      summary: Create a new group
      description: |
        The authenticated user becomes the group owner and is automatically joined
        as admin. The group starts in `waiting` status until the owner calls
        `PATCH /groups/{id}/start`. Draft types:
        - `snake` — live draft room with 60s per turn (requires members to pick)
        - `random` — teams assigned instantly at random on start
        - `balanced_tier` — auto-assigns teams ensuring equal tier distribution

        See §1.4 and §4.4 of PRODUCT_SYSTEM.md.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGroupRequest"
      responses:
        "201":
          description: Group created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Group"
        "400":
          $ref: "#/components/schemas/ApiError"

  /groups/join:
    post:
      tags: [Groups]
      summary: Join a group by invite code
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinGroupRequest"
      responses:
        "201":
          description: Joined successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          group_id:
                            type: string
                            format: uuid
                          group_name:
                            type: string
        "404":
          description: Invalid invite code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Group full or already a member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /groups/{id}:
    get:
      tags: [Groups]
      summary: Get group details (member only)
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Group"
        "403":
          $ref: "#/components/schemas/ApiError"
        "404":
          $ref: "#/components/schemas/ApiError"
    patch:
      tags: [Groups]
      summary: Update group settings (owner only, while status is waiting)
      description: |
        Allows the group owner to change the group name, max_members, or bonus_criteria
        before the draft has started. Only valid while group.status is `waiting`.
        See §4.4 of PRODUCT_SYSTEM.md.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateGroupRequest"
      responses:
        "200":
          description: Updated group
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Group"
        "400":
          $ref: "#/components/schemas/ApiError"
        "403":
          $ref: "#/components/schemas/ApiError"
        "404":
          $ref: "#/components/schemas/ApiError"

  /groups/{id}/start:
    patch:
      tags: [Groups]
      summary: Start the group — triggers draft or auto-assigns teams (owner only)
      description: |
        Transitions the group from `waiting` to either `draft` or `active`.

        - **snake draft_type**: creates a `draft_sessions` row, sends draft-start
          emails to all members, sets status → `draft`. Members must then visit
          the draft room (`GET /groups/{id}/draft`) and submit picks via
          `POST /groups/{id}/picks`.
        - **random / balanced_tier**: auto-assigns teams immediately, sets
          status → `active`, and sends active-start emails.

        See §4.5 of PRODUCT_SYSTEM.md for the full snake draft flow.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Group updated; for snake draft includes draft session details
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Group"
        "400":
          $ref: "#/components/schemas/ApiError"
        "403":
          $ref: "#/components/schemas/ApiError"
        "404":
          $ref: "#/components/schemas/ApiError"

  /groups/{id}/activate:
    patch:
      tags: [Groups]
      summary: Activate group after draft completes (owner only)
      description: |
        Transitions the group from `draft` → `active` after all draft picks are in.
        This is typically called automatically when the last pick is submitted, but
        can also be triggered manually by the owner. Seeds initial survivor lives
        for competitive/global groups. See §4.5 of PRODUCT_SYSTEM.md.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Group is now active
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Group"
        "400":
          $ref: "#/components/schemas/ApiError"
        "403":
          $ref: "#/components/schemas/ApiError"
        "404":
          $ref: "#/components/schemas/ApiError"

  /groups/{id}/draft:
    get:
      tags: [Draft]
      summary: Get full draft state (member only)
      description: |
        Returns the complete draft room snapshot: active session, all picks made so
        far, available teams, and all member metadata. Poll this endpoint (or use
        the same data with client-side timers) to drive the live draft UI.

        Only accessible while group.status is `draft`. Returns 400 if group is not
        in draft mode.

        See §4.5 of PRODUCT_SYSTEM.md — snake draft: 60s per turn, auto-pick on
        timeout, order reverses each round.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Current draft state
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/DraftState"
        "400":
          description: Group is not in draft mode
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          $ref: "#/components/schemas/ApiError"

  /groups/{id}/picks:
    post:
      tags: [Draft]
      summary: Submit a team pick during the snake draft
      description: |
        Submits a team pick for the authenticated user. Only valid when:
        - group.status is `draft`
        - It is currently the authenticated user's turn
        - The team_id is still in available_teams
        - The pick_deadline has not passed

        On submission the session advances to the next picker. If this was the
        last pick, the group is automatically transitioned to `active` and a
        draft-complete email is sent to all members.

        If the 60-second timer expires before a pick is submitted, a team is
        auto-assigned and the session advances automatically (server-side timer job).
        See §4.5 of PRODUCT_SYSTEM.md.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitPickRequest"
      responses:
        "200":
          description: Pick accepted; returns updated draft session
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/DraftSession"
        "400":
          description: Not your turn, team already picked, draft not active, or deadline passed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          $ref: "#/components/schemas/ApiError"
        "404":
          $ref: "#/components/schemas/ApiError"

  /groups/{id}/members/{userId}/auto-pick:
    patch:
      tags: [Draft]
      summary: Enable or disable auto-pick for a draft member (owner only)
      description: |
        Allows the group owner to toggle auto-pick for any member during an active
        snake draft. When enabled, the member's next turn is auto-assigned instead
        of waiting for the 60s timer to expire. Useful when a member is absent.
        See §4.5 of PRODUCT_SYSTEM.md.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: userId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled:
                  type: boolean
      responses:
        "200":
          description: Auto-pick preference updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccess"
        "400":
          $ref: "#/components/schemas/ApiError"
        "403":
          $ref: "#/components/schemas/ApiError"

  /groups/{id}/leaderboard:
    get:
      tags: [Groups]
      summary: Get the group leaderboard (member only)
      description: |
        Returns all members sorted by `total_points` descending. Points are the sum
        of `prediction_pts` (from scored predictions) and `ownership_pts` (from team
        performance). Default scoring: exact_score=5pts, correct_winner=3pts,
        goal_difference=2pts. Ownership: win=6pts, goal=2pts, clean_sheet=4pts.
        All values are per-group `scoring_config` overrides. Streak bonus applies
        after `streak_bonus_threshold` consecutive correct predictions.

        For league/competitive/global groups also includes `elo_rating`.
        For competitive/global groups also includes `is_eliminated` and
        `survivor_lives`. See §1.5 and §6.3 of PRODUCT_SYSTEM.md.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Leaderboard entries sorted by total_points descending
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/LeaderboardEntry"

  /groups/{id}/ownership:
    get:
      tags: [Groups]
      summary: Get team ownership / draft results (member only)
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Ownership rows sorted by draft_pick
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/TeamOwnership"

  /groups/{id}/predictions:
    get:
      tags: [Predictions]
      summary: Get the authenticated user's predictions for a group (member only)
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: Group ID
      responses:
        "200":
          description: Success — predictions with embedded match data
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Prediction"

  # ── Predictions ───────────────────────────────────────────────
  /predictions:
    post:
      tags: [Predictions]
      summary: Submit or update a score prediction (before lock)
      description: |
        Upserts a prediction on `(group_id, user_id, match_id)`.
        Predictions lock at `match.prediction_lock` (typically match kickoff).
        Returns 409 if the lock time has passed.

        **Scoring** (applied when `POST /sync-matches` processes match results):
        - `exact_score`: predicted home + away both match → default 5 pts
        - `correct_winner`: correct winner or draw, wrong scores → default 3 pts
        - `goal_difference`: correct goal difference, wrong winner → default 2 pts
        - `incorrect`: wrong result → 0 pts

        Point values are per group `scoring_config`. Bonus criteria predictions
        (e.g., btts, ht_winner) can be submitted in `details` when the group
        has those criteria enabled. See §4.6 and §6.5 of PRODUCT_SYSTEM.md.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitPredictionRequest"
      responses:
        "201":
          description: Prediction saved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Prediction"
        "400":
          $ref: "#/components/schemas/ApiError"
        "403":
          $ref: "#/components/schemas/ApiError"
        "404":
          $ref: "#/components/schemas/ApiError"
        "409":
          description: Prediction window closed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  # ── Admin ────────────────────────────────────────────────────
  /admin/weekly-reset:
    post:
      tags: [Admin]
      summary: Weekly leaderboard snapshot + survivor check + weekly_pts reset
      description: |
        Runs the weekly end-of-round processing for all active groups (or a
        specific competition). For each group:
        1. Snapshots current standings to `leaderboard_snapshots`
        2. For `competitive`/`global` groups: runs survivor check — members with
           0 `weekly_pts` lose a life; at 0 lives they are eliminated
        3. Resets `weekly_pts` to 0 (when `weekly_reset_enabled` is true)

        Requires `X-Admin-Secret` header.
      parameters:
        - in: query
          name: competition_id
          schema:
            type: string
            format: uuid
          description: Limit reset to groups within this competition
      security:
        - AdminSecret: []
      responses:
        "200":
          description: Reset successful
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          week_number:
                            type: integer
                          groups_processed:
                            type: integer
                          snapshots_taken:
                            type: integer
                          survivor_checks_run:
                            type: integer
                          members_eliminated:
                            type: integer
        "401":
          $ref: "#/components/schemas/ApiError"
        "503":
          $ref: "#/components/schemas/ApiError"

  /groups/{id}/survivor:
    get:
      tags: [Groups]
      summary: Get survivor state for a group
      description: |
        Returns each member's remaining lives, elimination status, and the
        round-by-round history. Only available for `competitive` and `global`
        mode groups.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Survivor state
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          survivor_lives_start:
                            type: integer
                          members:
                            type: array
                            items:
                              type: object
                          rounds:
                            type: array
                            items:
                              type: object
        "400":
          $ref: "#/components/schemas/ApiError"
        "403":
          $ref: "#/components/schemas/ApiError"

  /groups/{id}/elo-history:
    get:
      tags: [Groups]
      summary: Get ELO rating history for a group
      description: |
        Returns per-match ELO changes and current standings. Only populated for
        `league` and `competitive` mode groups.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: ELO history
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          current_elos:
                            type: array
                            items:
                              type: object
                          history:
                            type: array
                            items:
                              type: object
        "403":
          $ref: "#/components/schemas/ApiError"

  /admin/test-league/reset:
    post:
      tags: [Admin]
      summary: Reset test league match states
      description: |
        Resets all 5 test match dates/statuses so they cover all testable states:
        - Match 1: `completed` (2-1, scored 2 days ago)
        - Match 2: `live` (kicked off 30 min ago, lock expired)
        - Match 3: `scheduled` (prediction window open, kicks off in 2 days)
        - Match 4: `scheduled` (prediction window CLOSED, kicks off in 2h)
        - Match 5: `scheduled` (far-future final, kicks off in 7 days)

        Pass `?clear_data=true` to also wipe predictions and reset group member
        points/streaks/ELO back to zero.

        Requires `X-Admin-Secret` header matching the `ADMIN_SECRET` env var.
      parameters:
        - in: query
          name: clear_data
          schema:
            type: boolean
          description: Also clear predictions and reset group member stats
      security:
        - AdminSecret: []
      responses:
        "200":
          description: Reset successful
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          message:
                            type: string
                          matches_reset:
                            type: integer
                          data_cleared:
                            type: boolean
        "401":
          $ref: "#/components/schemas/ApiError"
        "503":
          $ref: "#/components/schemas/ApiError"

  # ───────────────────────────────────────
  # NOTIFICATIONS
  # ───────────────────────────────────────
  /notifications:
    get:
      tags: [Notifications]
      summary: List user notifications
      description: |
        Returns paginated notifications for the authenticated user, newest first,
        along with the count of unread notifications.

        Notification types:
        - `lock_reminder` — upcoming match prediction deadline warning
        - `rivalry_result` — weekly 1v1 rivalry outcome
        - `rank_swing` — significant leaderboard position change
        - `boost_ready` — a boost is available to use
        - `streak_broken` — user's prediction streak ended

        See §6.3 of PRODUCT_SYSTEM.md for the `notifications` table schema.
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
            maximum: 100
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Notifications list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          notifications:
                            type: array
                            items:
                              $ref: "#/components/schemas/Notification"
                          unread_count:
                            type: integer
        "401":
          $ref: "#/components/schemas/ApiError"

  /notifications/read-all:
    patch:
      tags: [Notifications]
      summary: Mark all notifications as read
      security:
        - BearerAuth: []
      responses:
        "200":
          description: All notifications marked read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccess"
        "401":
          $ref: "#/components/schemas/ApiError"

  /notifications/{id}/read:
    patch:
      tags: [Notifications]
      summary: Mark a single notification as read
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Notification marked read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccess"
        "401":
          $ref: "#/components/schemas/ApiError"

  # ───────────────────────────────────────
  # RIVALRIES
  # ───────────────────────────────────────
  /groups/{id}/rivalries:
