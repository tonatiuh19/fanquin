      responses:
        "201":
          description: Entry recorded
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/DailyChallengeEntry"
        "400":
          $ref: "#/components/schemas/ApiError"
        "404":
          $ref: "#/components/schemas/ApiError"
        "410":
